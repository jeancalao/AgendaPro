# Render Blueprint — AgendaPRO
# Documentação: https://render.com/docs/blueprint-spec

services:
  # ─── Backend: API Node.js ───────────────────────────────────────────────────
  - type: web
    name: agendapro-api
    env: node
    plan: free
    buildCommand: >
      npm ci --include=dev &&
      npm run db:generate -w packages/database &&
      npm run build -w packages/shared &&
      npm run build -w packages/database &&
      npm run build -w apps/api
    startCommand: >
      npm run db:migrate:prod -w packages/database &&
      node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Injetado automaticamente pelo Render a partir do banco abaixo
      - key: DATABASE_URL
        fromDatabase:
          name: agendapro-db
          property: connectionString
      # Gerado automaticamente pelo Render (string aleatória segura)
      - key: JWT_SECRET
        generateValue: true
      # Preencher no dashboard após o primeiro deploy:
      # https://dashboard.render.com → agendapro-api → Environment
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

  # ─── Frontend: React/Vite (site estático) ──────────────────────────────────
  - type: web
    name: agendapro-web
    env: static
    buildCommand: >
      npm ci &&
      npm run build -w packages/shared &&
      npm run build -w apps/web
    staticPublishPath: apps/web/dist
    # Redireciona todas as rotas para index.html (necessário para React Router)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # URL da API após deploy: ex. https://agendapro-api.onrender.com
      - key: VITE_API_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

# ─── Banco de Dados: PostgreSQL ──────────────────────────────────────────────
databases:
  - name: agendapro-db
    databaseName: agendapro
    user: agendapro
    plan: free
